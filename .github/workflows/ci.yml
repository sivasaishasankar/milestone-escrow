name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  contracts:
    name: contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2

      # ed25519-dalek pinned to 2.2.0 in Cargo.lock (see contracts/arbiter/Cargo.toml)
      # to work around an upstream soroban-env-host 26.1.3 version-range bug.
      - name: cargo test
        run: cargo test --workspace

      - name: cargo build --release (escrow, wasm32v1-none)
        run: cargo build --target wasm32v1-none --release -p waypoint-escrow

      - name: cargo build --release (arbiter, wasm32v1-none)
        run: cargo build --target wasm32v1-none --release -p waypoint-arbiter

  frontend:
    name: frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Build (static export)
        run: npm run build
        env:
          NEXT_PUBLIC_ESCROW_CONTRACT_ADDRESS: ${{ secrets.NEXT_PUBLIC_ESCROW_CONTRACT_ADDRESS }}
          NEXT_PUBLIC_ARBITER_CONTRACT_ADDRESS: ${{ secrets.NEXT_PUBLIC_ARBITER_CONTRACT_ADDRESS }}
          NEXT_PUBLIC_STELLAR_NETWORK: testnet
          NEXT_PUBLIC_STELLAR_RPC_URL: https://soroban-testnet.stellar.org:443
